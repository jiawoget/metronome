name: Debt gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  debt-gates:
    name: Changed-file debt gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up npm
        run: npm install -g npm@11.17.0

      - name: Install dependencies
        run: npm ci

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Validate debt gate package
        run: npm run validate:debt-gates

      - name: Generate primitive index
        run: npm run debt:primitive-index

      - name: Run changed-file Semgrep debt gates
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha || 'origin/main' }}
        run: npm run lint:debt:changed
