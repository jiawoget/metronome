name: Metronome Debt Gates

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  semgrep-debt-gates:
    name: Semgrep debt gates on changed files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set npm version
        run: npm install -g npm@11.17.0

      - name: Install dependencies
        run: npm ci

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Validate debt gate package
        run: node scripts/validate-metronome-gates.mjs

      - name: Run Semgrep debt gates on changed files
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: node scripts/run-metronome-semgrep-changed.mjs

      - name: Install CodeScene CLI
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://downloads.codescene.io/enterprise/cli/cs-linux-amd64-latest.zip -o /tmp/cs.zip
          unzip -o /tmp/cs.zip -d "$HOME/.local/bin"
          chmod +x "$HOME/.local/bin/cs"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run CodeScene delta debt gates on changed files
        env:
          BASE_REF: origin/${{ github.base_ref }}
          HEAD_REF: origin/${{ github.head_ref }}
          CS_ACCESS_TOKEN: ${{ secrets.CODESCENE_ACCESS_TOKEN || secrets.CS_ACCESS_TOKEN }}
          CS_ONPREM_URL: ${{ secrets.CODESCENE_ONPREM_URL || secrets.CS_ONPREM_URL }}
        run: node scripts/run-codescene-debt-changed.mjs

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Lint
        run: npm run lint --if-present
